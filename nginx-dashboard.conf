server {
    listen       8081;
    server_name  localhost 192.168.1.100;

    location /dashboard/ {
        alias /Users/serveradmin/token-dashboard/;
        index index.html;
    }

    location /cloudwise/ {
        alias /Users/serveradmin/cloudwise-demo/dist/;
        index index.html;
        try_files $uri $uri/ /cloudwise/index.html;
    }

    location / {
        return 301 /dashboard/;
    }
}
